<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Hunter - Max Revenue</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            background: #f8fafc; font-family: sans-serif; overflow: hidden; touch-action: none; 
            position: fixed; width: 100%;
        }
        
        /* 上部広告：100px固定 */
        #ad-top-container { position: fixed; top: 0; left: 0; width: 100%; height: 100px; background: #000; z-index: 9999; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* ゲームエリア：上部広告分(100px)下げる */
        #game-area { 
            position: absolute; top: 100px; bottom: 0; left: 0; right: 0; background: #fff; overflow: hidden; z-index: 10;
        }
        
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 22px; font-weight: bold; pointer-events: none; z-index: 15; color: #1e293b; }
        .number-bubble { position: absolute; width: 55px; height: 55px; background: #3b82f6; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; box-shadow: 0 4px #1d4ed8; cursor: pointer; transition: opacity 0.1s; }
        
        /* メニュー/リザルト画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.98); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200; padding: 10px; box-sizing: border-box; color: white;
        }

        /* リザルト用 300x250 広告枠 */
        #mid-ad-container {
            width: 300px; height: 250px; background: #000; margin: 15px 0;
            display: none; justify-content: center; align-items: center;
            border-radius: 10px; overflow: hidden; border: 1px solid #334155;
        }

        /* 5秒全画面広告 */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 330px; background: #fff; position: relative; border-radius: 8px; }
        #close-ad-btn { position: absolute; top: -50px; right: 0px; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; border: 2px solid #fff; cursor: pointer; }
        
        .btn-group { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
        .menu-btn { padding: 15px 0; font-size: 18px; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; width: 260px; text-align: center; transition: 0.2s; }
        #goButton { background: #22c55e; box-shadow: 0 4px #16a34a; }
        #goButton:disabled { background: #475569; box-shadow: none; opacity: 0.7; cursor: default; }
        .link-btn { background: #3b82f6; box-shadow: 0 4px #2563eb; }
    </style>
</head>
<body>
    <div id="ad-top-container">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-area">
        <div id="ui">Next: <span id="next-num">1</span></div>
        
        <div id="menuScreen">
            <div style="text-align:center;">
                <h2 id="menuTitle" style="color:#facc15; margin:0; font-size: 32px;">NUMBER HUNTER</h2>
                <p id="menuMsg" style="margin:5px 0; font-size: 16px;">数字を順番にタップ！</p>
            </div>

            <div id="mid-ad-container">
                <ins class="adsbygoogle"
                     style="display:inline-block;width:300px;height:250px"
                     data-ad-client="ca-pub-1299640300068792"
                     data-ad-slot="9050127185"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="btn-group" id="btnGroup">
                <button id="goButton" class="menu-btn">START</button>
                <a href="https://saaaachi.github.io/" class="menu-btn link-btn">他のゲームへ</a>
            </div>
        </div>

        <div id="game-container" style="width:100%; height:100%;"></div>
    </div>

    <div id="inter-screen">
        <div class="inter-content">
            <div id="close-ad-btn" onclick="closeAd()">5</div>
            <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:8px; background: #fff;"></iframe>
        </div>
    </div>

    <script>
        const container = document.getElementById("game-container"), 
              nextDisplay = document.getElementById("next-num"), 
              menuScreen = document.getElementById("menuScreen"), 
              menuTitle = document.getElementById("menuTitle"), 
              menuMsg = document.getElementById("menuMsg"), 
              goButton = document.getElementById("goButton"),
              adMid = document.getElementById("mid-ad-container");
        
        let currentTarget = 1, gameActive = false, nextSpawnValue = 1, playCount = 0;

        goButton.onclick = () => {
            menuScreen.style.display = "none"; adMid.style.display = "none";
            gameActive = true; currentTarget = 1; nextSpawnValue = 1;
            nextDisplay.innerText = 1; container.innerHTML = "";
            for(let i=0; i<8; i++) spawnNumber();
        };

        function spawnNumber() {
            if(!gameActive) return;
            const val = nextSpawnValue++, bubble = document.createElement("div");
            bubble.className = "number-bubble"; bubble.innerText = val;
            const maxX = container.clientWidth - 60, maxY = container.clientHeight - 60;
            bubble.style.left = Math.random() * maxX + "px"; bubble.style.top = Math.random() * maxY + "px";
            
            bubble.onpointerdown = (e) => {
                e.preventDefault(); if(!gameActive) return;
                if(val === currentTarget) {
                    bubble.style.pointerEvents = "none"; bubble.style.opacity = "0";
                    setTimeout(() => bubble.remove(), 100); currentTarget++; nextDisplay.innerText = currentTarget; spawnNumber();
                } else { gameOver(); }
            };
            container.appendChild(bubble);
        }

        function gameOver() {
            gameActive = false; playCount++;
            menuTitle.innerText = "GAME OVER"; menuTitle.style.color = "#ef4444";
            menuMsg.innerText = "SCORE: " + (currentTarget - 1);
            
            goButton.innerText = "お待ちください..."; goButton.disabled = true;
            adMid.style.display = "flex";
            menuScreen.style.display = "flex";

            // 1.5秒後にボタン有効化
            setTimeout(() => { goButton.disabled = false; goButton.innerText = "RETRY"; }, 1500);
            
            // 2回目、5回目、8回目...のタイミングで全画面広告
            if (playCount === 2 || (playCount >= 5 && (playCount - 2) % 3 === 0)) {
                setTimeout(showLargeAd, 500);
            }
        }

        function showLargeAd() {
            const screen = document.getElementById("inter-screen"), closeBtn = document.getElementById("close-ad-btn"), ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let timer = 5;
            closeBtn.innerText = timer; closeBtn.style.pointerEvents = "none"; closeBtn.style.background = "#555";
            const countdown = setInterval(() => {
                timer--;
                if (timer > 0) closeBtn.innerText = timer;
                else {
                    clearInterval(countdown);
                    closeBtn.innerText = "×";
                    closeBtn.style.background = "#ff4444";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }
    </script>
</body>
</html>
